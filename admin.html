<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2; url=index.html">
  <title>管理后台 - SAMPSON科研实验组</title>
  <style>
    body {
      margin: 0;
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a3e3e 0%, #0d2020 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 460px;
    }
    .box h1 { color: #1a3e3e; margin-bottom: 12px; font-size: 20px; }
    .box p  { color: #555; font-size: 14px; margin-bottom: 24px; line-height: 1.7; }
    .box a  {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #1a3e3e, #2d6b6b);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
    .box a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔧 管理后台</h1>

  </div>
</body>
